<!DOCTYPE html>

<body style="font-family: sans-serif; background-color: #f0f0f0; padding: 20px;">

    <h2 style="text-align: center; margin-bottom: 30px;">Project Videos</h2>

    <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;">

        <div style="width: 640px; text-align: center;">

                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:40px;background:rgba(0,0,0,0.7);color:#fff;text-align:center;line-height:40px;border-radius:8px;font-size:20px;">▶</div>
            </div>
        </div>
